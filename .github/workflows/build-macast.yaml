name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug_ssh:
        description: '启用 SSH 调试（仅构建失败时）'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # macOS arm64 构建
  # ============================================================
  build-darwin:
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      dmg_name: ${{ steps.artifact.outputs.dmg_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-darwin-${{ runner.os }}-${{ hashFiles('requirements/darwin.txt') }}
          restore-keys: |
            pip-darwin-${{ runner.os }}-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          pip3 install -r requirements/darwin.txt
          pip3 install py2app

      - name: Download mpv
        run: |
          wget -q https://laboratory.stolendata.net/~djinn/mpv_osx/mpv-latest.tar.gz
          mkdir -p bin && tar --strip-components 2 -C bin -xzf mpv-latest.tar.gz mpv.app/Contents/MacOS

      - name: Compile i18n
        run: |
          for file in i18n/*; do
            msgfmt -o "$file/LC_MESSAGES/macast.mo" "$file/LC_MESSAGES/macast.po"
            echo "$file"
          done

      - name: Build macOS app
        run: |
          python3 setup_py2app.py py2app --arch=arm64
          cp -R bin dist/Macast.app/Contents/Resources/

      - name: Determine version
        id: version
        run: |
          VERSION="$(cat macast/.version)"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package DMG
        id: artifact
        run: |
          DMG_NAME="Macast-MacOS-arm64-${{ steps.version.outputs.version }}.dmg"
          create-dmg \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Macast.app" 200 190 \
            --hide-extension "Macast.app" \
            --app-drop-link 600 185 \
            --volname "Macast ${{ steps.version.outputs.version }}" \
            "$DMG_NAME" "dist/"
          echo "dmg_name=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        run: |
          shasum -a 256 "${{ steps.artifact.outputs.dmg_name }}" \
            > "${{ steps.artifact.outputs.dmg_name }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.dmg_name }}
          path: |
            ${{ steps.artifact.outputs.dmg_name }}
            ${{ steps.artifact.outputs.dmg_name }}.sha256
          retention-days: 30

      - name: SSH debug (manual only)
        if: failure() && github.event_name == 'workflow_dispatch' && inputs.debug_ssh
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

  # ============================================================
  # 自动发布 (tag push) 或手动发布 (workflow_dispatch)
  # ============================================================
  release:
    needs: [build-darwin]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate release notes
        id: changelog
        run: |
          RELEASE_MD="/tmp/release_body.md"
          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")"
          if [ -n "$PREV_TAG" ]; then
            {
              echo "## 📝 更新内容"
              echo ""
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD"
            } > "$RELEASE_MD"
          else
            {
              echo "## 🚀 首次发布"
              echo ""
              git log --pretty=format:"- %s (%h)" -10
            } > "$RELEASE_MD"
          fi

          # 追加校验和信息
          {
            echo ""
            echo "## 🔐 校验和 (SHA256)"
            echo '```'
            cat dist/*.sha256 2>/dev/null || true
            echo '```'
          } >> "$RELEASE_MD"

          # 设置 output
          {
            echo 'body<<EOF'
            cat "$RELEASE_MD"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: Macast ${{ needs.build-darwin.outputs.version }}
          tag: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          omitBodyDuringUpdate: false
          artifacts: dist/*.dmg
          artifactErrorsFailBuild: true
